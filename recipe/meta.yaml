{% set name = "versioned-hdf5" %}
{% set version = "2.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/versioned_hdf5-{{ version }}.tar.gz
  sha256: 47dc3958738b407e32464984cfae349d7f570af83c5a540eaf02bdda2878e3ef

build:
  number: 0

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - hdf5                                   # [build_platform != target_platform]
    - zlib                                   # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - pkg-config                             # [build_platform != target_platform]
    - meson-python                           # [build_platform != target_platform]
    - {{ compiler("c") }}
    - {{ stdlib("c") }}
  host:
    - python
    - python-build
    - pip
    - setuptools-scm
    - numpy
    # .ci_support/migrations/hdf52.yaml determines the versions of hdf5 to build
    # against. This in turn introduces exact pins (vs. minor version) at runtime.
    - hdf5
    - zlib
    - cython
    - pkg-config
    - meson-python
  run:
    - python
    # Actually supported versions of hdf5 depend on what this recipe was built against
    - hdf5
    # Actually supported versions of hdf5 are limited to those built against the same
    # version of hdf5 as this recipe
    - h5py >=3.8.0
    - ndindex >=1.5.1
    - numpy >=1.24.4

test:
  imports:
    - versioned_hdf5
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/deshaw/versioned-hdf5
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Versioned HDF5 provides a versioned abstraction on top of h5py.

  description: |
    Versioned HDF5 provides a versioned abstraction on top of `h5py`.
    This was created by the D. E. Shaw group <https://www.deshaw.com/> in conjunction
    with Quansight <https://www.quansight.com/>.
  doc_url: https://deshaw.github.io/versioned-hdf5
  dev_url: https://github.com/deshaw/versioned-hdf5

extra:
  recipe-maintainers:
    - peytondmurray
    - crusaderky
    - melissawm
    - asmeurer
    - scopatz
