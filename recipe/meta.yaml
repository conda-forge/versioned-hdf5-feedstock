{% set name = "versioned-hdf5" %}
{% set version = "2.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/b2/7d/0bdaca6befcb5e04980aff5268ed07bd95d2bd9b864772a92c2366e2157c/versioned_hdf5-2.0.2.tar.gz
  sha256: 7d220e4c124ac5ae6221dba5ff64aa144ac9087d3408923923825e7e7a213a02

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vv

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - pip                                    # [build_platform != target_platform]
    - setuptools                             # [build_platform != target_platform]
    - setuptools_scm                         # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - hdf5                                   # [build_platform != target_platform]
    - zlib                                   # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - pkgconfig                              # [build_platform != target_platform]
    - meson                                  # [build_platform != target_platform]
    - meson-python                           # [build_platform != target_platform]
    - make                                   # [build_platform != target_platform]
    - mpi                                    # [build_platform != target_platform]
    - mpi4py >=3.0                           # [build_platform != target_platform]

    - {{ compiler("c") }}
    - {{ compiler("cxx") }}
    - {{ stdlib("c") }}
  host:
    - python
    - pip
    - setuptools
    - setuptools_scm
    - numpy
    # need to list hdf5 twice to get version pinning from conda_build_config
    - hdf5
    - zlib
    - cython
    - pkgconfig
    - meson
    - meson-python
    - make
    - mpi
    - mpi4py >=3.0
  run:
    - python
    - hdf5
    - h5py >=3.8.0
    - ndindex >=1.5.1
    - numpy >=1.24.4

test:
  imports:
    - versioned_hdf5
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/deshaw/versioned-hdf5
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Versioned HDF5 provides a versioned abstraction on top of h5py.

  description: |
    Versioned HDF5 provides a versioned abstraction on top of `h5py`.
    This was created by the D. E. Shaw group <https://www.deshaw.com/> in conjunction
    with Quansight <https://www.quansight.com/>.
  doc_url: https://deshaw.github.io/versioned-hdf5
  dev_url: https://github.com/deshaw/versioned-hdf5

extra:
  recipe-maintainers:
    - peytondmurray
    - crusaderky
    - melissawm
    - asmeurer
    - scopatz
